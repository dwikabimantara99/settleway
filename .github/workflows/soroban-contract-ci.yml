name: Soroban Contract CI

on:
  push:
    branches:
      - main
      - "cleanup/**"
      - "productization/**"
      - "work/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    name: Format, test, and build Wasm
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: contracts/settleway_escrow

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Display Rust toolchain versions
        run: |
          rustup --version
          rustc --version
          cargo --version

      - name: Select stable Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Add required components and target
        run: |
          rustup component add rustfmt clippy
          rustup target add wasm32v1-none

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run contract unit tests
        run: cargo test --verbose

      - name: Build contract Wasm
        run: cargo build --target wasm32v1-none --release --verbose

      - name: Confirm Wasm output
        run: |
          find target/wasm32v1-none/release \
            -maxdepth 1 \
            -type f \
            -name "*.wasm" \
            -print

      - name: Upload Wasm artifact
        uses: actions/upload-artifact@v7
        with:
          name: settleway-escrow-wasm
          path: contracts/settleway_escrow/target/wasm32v1-none/release/settleway_escrow.wasm
