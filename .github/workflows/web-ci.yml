name: Web CI

on:
  push:
    branches:
      - main
      - "cleanup/**"
      - "productization/**"
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-lint-typecheck-build:
    name: Test, lint, typecheck, and demo build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_RUNTIME_MODE: demo

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Build in deterministic demo mode
        run: npm run build
